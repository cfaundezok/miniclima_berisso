<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clima en la Escuela</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 80vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: 300px;
    }

    .temp {
      font-size: 64px;
      font-weight: bold;
    }

    .desc {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .data {
      margin-top: 15px;
      text-align: left;
    }

    .data p {
      margin: 5px 0;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>🌤️ Clima en la Escuela</header>

<div class="container">
  <div class="card">

    <div class="temp" id="temp">--°C</div>
    <div class="desc" id="estado">Cargando...</div>

    <div class="data">
      <p>💧 Humedad: <span id="hum">--</span>%</p>
      <p>🌬️ Viento: <span id="viento">--</span> km/h</p>
      <p>📊 Presión: <span id="pres">--</span> hPa</p>
      <p>🌧️ Lluvia: <span id="lluvia">--</span> mm</p>
    </div>

  </div>

  <footer id="hora">Actualizando...</footer>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzPlhvZM4vBx4wzdD44TXnG2e4BEf2ZmN0y5bupiB4L4aviVmuRliTFfglVYOiDXZEFsA/exec";

function obtenerEstado(temp, humedad) {
  if (temp > 30) return "🔥 Muy caluroso";
  if (temp > 25) return "☀️ Caluroso";
  if (temp > 18) return "🌤️ Agradable";
  if (temp > 10) return "☁️ Fresco";
  return "❄️ Frío";
}

function actualizar() {
  fetch(URL)
    .then(res => res.json())
    .then(data => {
      document.getElementById("temp").innerText = data.temperatura + "°C";
      document.getElementById("hum").innerText = data.humedad;
      document.getElementById("viento").innerText = data.viento;
      document.getElementById("pres").innerText = data.presion;
      document.getElementById("lluvia").innerText = data.lluvia || 0;

      document.getElementById("estado").innerText =
        obtenerEstado(data.temperatura, data.humedad);

      document.getElementById("hora").innerText =
        "Última actualización: " + data.hora;
    });
}

actualizar();
setInterval(actualizar, 60000);
</script>

</body>
</html>
