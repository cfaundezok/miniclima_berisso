<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clima en la Escuela</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(#2c3e50, #000);
      color: white;
      text-align: center;
      transition: background 1s;
    }

    header {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .sub {
      font-size: 14px;
      opacity: 0.7;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 75vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .temp {
      font-size: 64px;
      font-weight: bold;
    }

    .desc {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .extra {
      font-size: 14px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .data {
      margin-top: 15px;
      text-align: left;
      font-size: 15px;
    }

    .data p {
      margin: 6px 0;
    }

    footer {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  🌤️ Clima en la Escuela  
  <div class="sub">EEST N°2 "Ing. Emilio Revuelto" - Berisso</div>
</header>

<div class="container">
  <div class="card">

    <div class="temp" id="temp">--°C</div>
    <div class="desc" id="estado">Cargando...</div>
    <div class="extra" id="sensacion"></div>

    <div class="data">
      <p>💧 Humedad: <span id="hum">--</span>%</p>
      <p>🌬️ Viento: <span id="viento">--</span> km/h</p>
      <p>💨 Ráfagas: <span id="rafaga">--</span> km/h</p>
      <p>📊 Presión: <span id="pres">--</span> hPa</p>
      <p>🌧️ Lluvia: <span id="lluvia">--</span> mm</p>
    </div>

  </div>

  <footer id="hora">Actualizando...</footer>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzPlhvZM4vBx4wzdD44TXnG2e4BEf2ZmN0y5bupiB4L4aviVmuRliTFfglVYOiDXZEFsA/exec";

// Estado climático más completo
function obtenerEstado(temp, humedad, viento, lluvia) {
  if (lluvia > 0) return "🌧️ Lluvia";
  if (viento > 40) return "💨 Ventoso";
  if (humedad > 85 && temp > 20) return "🌫️ Muy húmedo";
  if (temp > 30) return "🔥 Muy caluroso";
  if (temp > 25) return "☀️ Caluroso";
  if (temp > 18) return "🌤️ Agradable";
  if (temp > 10) return "☁️ Fresco";
  return "❄️ Frío";
}

// Sensación térmica simple
function sensacionTermica(temp, humedad) {
  return temp + (0.33 * humedad/100 * 6) - 2;
}

// Fondo dinámico
function cambiarFondo(temp) {
  let color;

  if (temp > 30) color = "#ff512f";
  else if (temp > 20) color = "#f09819";
  else if (temp > 10) color = "#56ccf2";
  else color = "#2c3e50";

  document.body.style.background = `linear-gradient(${color}, #000)`;
}

// Actualizar datos
function actualizar() {
  fetch(URL)
    .then(res => res.json())
    .then(data => {

      document.getElementById("temp").innerText = data.temperatura + "°C";
      document.getElementById("hum").innerText = data.humedad;
      document.getElementById("viento").innerText = data.viento;
      document.getElementById("rafaga").innerText = data.rafaga || 0;
      document.getElementById("pres").innerText = data.presion;
      document.getElementById("lluvia").innerText = data.lluvia || 0;

      // Estado
      let estado = obtenerEstado(
        data.temperatura,
        data.humedad,
        data.viento,
        data.lluvia
      );

      document.getElementById("estado").innerText = estado;

      // Sensación térmica
      let st = sensacionTermica(data.temperatura, data.humedad);
      document.getElementById("sensacion").innerText =
        "Sensación térmica: " + st.toFixed(1) + "°C";

      // Hora
      document.getElementById("hora").innerText =
        "Actualizado: " + new Date().toLocaleTimeString();

      // Fondo dinámico
      cambiarFondo(data.temperatura);
    });
}

actualizar();
setInterval(actualizar, 60000);
</script>

</body>
</html>
