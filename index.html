<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estación Meteorológica – EEST N°2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#080e1a;
  --surface:rgba(255,255,255,0.045);
  --border:rgba(255,255,255,0.08);
  --accent:#38bdf8;
  --accent2:#818cf8;
  --green:#4ade80;
  --text:#e2e8f0;
  --muted:rgba(226,232,240,0.45);
  --radius:16px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  padding:20px;
}

h1{
  font-size:28px;
  margin-bottom:5px;
}

.sub{
  color:var(--muted);
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  text-align:center;
}

.valor{
  font-size:32px;
  font-weight:600;
}

.label{
  font-size:14px;
  color:var(--muted);
}

.temp{
  font-size:60px;
  margin:20px 0;
}

.estado{
  margin-top:10px;
  font-size:18px;
}

.footer{
  margin-top:30px;
  font-size:14px;
  color:var(--muted);
}

.error{
  margin-top:10px;
  color:#f87171;
  display:none;
}
</style>
</head>

<body>

<h1>Estación Meteorológica</h1>
<div class="sub">EEST N°2 – Berisso</div>

<div class="temp" id="temp">--°C</div>
<div class="estado" id="estado">--</div>

<div class="grid">

<div class="card">
  <div class="valor" id="hum">--%</div>
  <div class="label">Humedad</div>
</div>

<div class="card">
  <div class="valor" id="press">-- hPa</div>
  <div class="label">Presión</div>
</div>

<div class="card">
  <div class="valor" id="wind">-- km/h</div>
  <div class="label">Viento</div>
</div>

<div class="card">
  <div class="valor" id="gust">-- km/h</div>
  <div class="label">Ráfagas</div>
</div>

<div class="card">
  <div class="valor" id="rain">-- mm</div>
  <div class="label">Lluvia</div>
</div>

<div class="card">
  <div class="valor" id="hora">--</div>
  <div class="label">Actualizado</div>
</div>

</div>

<div class="error" id="error">Error al obtener datos</div>

<div class="footer">
Proyecto conjunto entre la escuela, el municipio y la universidad
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzPlhvZM4vBx4wzdD44TXnG2e4BEf2ZmN0y5bupiB4L4aviVmuRliTFfglVYOiDXZEFsA/exec";

async function cargarDatos(){
  try{
    const res = await fetch(URL);
    const data = await res.json();

    document.getElementById("temp").innerText = data.temperatura + "°C";
    document.getElementById("hum").innerText = data.humedad + "%";
    document.getElementById("press").innerText = data.presion + " hPa";
    document.getElementById("wind").innerText = data.viento + " km/h";
    document.getElementById("gust").innerText = data.rafaga + " km/h";
    document.getElementById("rain").innerText = data.lluvia + " mm";
    document.getElementById("hora").innerText = data.hora;

    document.getElementById("estado").innerText = estado(data);

    document.getElementById("error").style.display="none";

  }catch(e){
    document.getElementById("error").style.display="block";
  }
}

function estado(d){
  if(d.lluvia > 0) return "Lluvia 🌧️";
  if(d.humedad > 85) return "Muy húmedo 💧";
  if(d.temperatura > 30) return "Caluroso 🔥";
  if(d.temperatura < 10) return "Frío ❄️";
  return "Estable 🌤️";
}

setInterval(cargarDatos,60000);
cargarDatos();

</script>

</body>
</html>
